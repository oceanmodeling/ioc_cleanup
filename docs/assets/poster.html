p;lt;/a&amp;gt;\nis widely used for storm-surge validation, tsunami detection and sea-level research.\nYet, the cleaning step is typically:&amp;lt;/p&amp;gt;\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;\u274c &amp;lt;strong&amp;gt;Manual&amp;lt;/strong&amp;gt; - bespoke scripts per analyst&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;\u274c &amp;lt;strong&amp;gt;Poorly documented&amp;lt;/strong&amp;gt; - decisions are rarely recorded&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;\u274c &amp;lt;strong&amp;gt;Hard to reproduce&amp;lt;/strong&amp;gt; - no shared format or audit trail&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;\u274c &amp;lt;strong&amp;gt;Difficult to review&amp;lt;/strong&amp;gt; - impossible to peer-review&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;ioc_cleanup&amp;lt;/strong&amp;gt; proposes a &amp;lt;strong&amp;gt;community-driven, version-controlled&amp;lt;/strong&amp;gt; method\nwhere every cleaning transformation is stored in a plain &amp;lt;strong&amp;gt;JSON transformation file&amp;lt;/strong&amp;gt;:&amp;lt;/p&amp;gt;\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;\u2705 Explicit &amp;amp;amp; human-readable&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;\u2705 Version-controlled on GitHub&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;\u2705 Fully reproducible&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;\u2705 Open to peer review via pull requests&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n"}},{"type":"object","name":"panel.models.markup.HTML","id":"p1239","attributes":{"css_classes":["markdown"],"styles":{"type":"map","entries":[["font-size","18px"],["background-color","#FFFFFF"]]},"stylesheets":["\n:host(.pn-loading):before, .pn-loading:before {\n  background-color: #c3c3c3;\n  mask-size: auto calc(min(50%, 300px));\n  -webkit-mask-size: auto calc(min(50%, 300px));\n}",{"id":"p1225"},"nav#header {display: none}",{"id":"p1232"},{"id":"p1223"},{"id":"p1224"}],"width":800,"min_width":800,"margin":[5,10],"align":"start","text":"&amp;lt;style&amp;gt;\ntable {\n    wid
